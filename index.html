<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastoFácil</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        .resumo { display: flex; justify-content: space-around; margin-top: 10px; }
        .valor { font-size: 1.4rem; font-weight: bold; display: block; margin-top: 5px; }
        .receita { color: #28a745; }
        .despesa { color: #dc3545; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>GastoFácil</h2>
        <div class="resumo">
            <div><small>Receitas</small><span id="r" class="valor receita">R$ 0,00</span></div>
            <div><small>Despesas</small><span id="d" class="valor despesa">R$ 0,00</span></div>
        </div>
        <hr><small>Saldo</small><span id="s" class="valor">R$ 0,00</span>
    </div>

    <div class="card">
        <input type="text" id="desc" placeholder="Descrição">
        <input type="number" id="val" placeholder="Valor R$">
        <input type="date" id="data">
        <select id="tipo"><option value="receita">Receita (+)</option><option value="despesa">Despesa (-)</option></select>
        <button onclick="salvar()">Salvar</button>
    </div>

    <table id="tabela">
        <thead><tr><th>Data</th><th>Desc.</th><th>R$</th></tr></thead>
        <tbody id="lista"></tbody>
    </table>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const config = {
        apiKey: "AIzaSyAccacBLrvONf4PXDYAhCUoPmZQxi1PJlI",
        authDomain: "despesas-547a2.firebaseapp.com",
        databaseURL: "https://despesas-547a2-default-rtdb.firebaseio.com",
        projectId: "despesas-547a2"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    const dbRef = ref(db, 'transacoes');

    window.salvar = function() {
        const desc = document.getElementById('desc').value;
        const val = parseFloat(document.getElementById('val').value);
        const data = document.getElementById('data').value;
        const tipo = document.getElementById('tipo').value;

        if(desc && val && data) {
            push(dbRef, { desc, val, data, tipo }).then(() => {
                document.getElementById('desc').value = "";
                document.getElementById('val').value = "";
            });
        } else { alert("Preencha tudo!"); }
    };

    onValue(dbRef, (snap) => {
        const dados = snap.val();
        let tr = 0, td = 0, html = "";
        if(dados) {
            Object.keys(dados).reverse().forEach(k => {
                const i = dados[k];
                if(i.tipo === 'receita') tr += i.val; else td += i.val;
                html += "<tr><td>" + i.data + "</td><td>" + i.desc + "</td><td>R$ " + i.val.toFixed(2) + "</td></tr>";
            });
        }
        document.getElementById('lista').innerHTML = html;
        document.getElementById('r').innerText = "R$ " + tr.toFixed(2);
        document.getElementById('d').innerText = "R$ " + td.toFixed(2);
        document.getElementById('s').innerText = "R$ " + (tr - td).toFixed(2);
    });
</script>
</body>
</html>
