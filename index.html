<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastoFácil - Oficial</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; color: #333; margin: 0; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        h2 { margin: 0 0 10px 0; color: #1a365d; }
        .resumo { display: flex; justify-content: space-around; margin-top: 10px; }
        .v-box { flex: 1; }
        .v-label { font-size: 12px; text-transform: uppercase; color: #666; }
        .valor { font-size: 1.4rem; font-weight: bold; display: block; margin-top: 5px; }
        .receita { color: #28a745; }
        .despesa { color: #dc3545; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #eee; padding: 10px; font-size: 12px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 12px; font-size: 14px; }
        .btn-excluir { background: #ff4d4d; color: white; border: none; padding: 6px 10px; border-radius: 5px; width: auto; font-size: 12px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>GastoFácil</h2>
        <div class="resumo">
            <div class="v-box">
                <span class="v-label">Receitas</span>
                <span id="tot-r" class="valor receita">R$ 0,00</span>
            </div>
            <div class="v-box">
                <span class="v-label">Despesas</span>
                <span id="tot-d" class="valor despesa">R$ 0,00</span>
            </div>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        <span class="v-label">Saldo Atual</span>
        <span id="tot-s" class="valor">R$ 0,00</span>
    </div>

    <div class="card">
        <input type="text" id="ipt-desc" placeholder="Ex: Aluguel, Mercado...">
        <input type="number" id="ipt-val" placeholder="Valor R$">
        <input type="date" id="ipt-data">
        <select id="ipt-tipo">
            <option value="receita">Receita (+)</option>
            <option value="despesa">Despesa (-)</option>
        </select>
        <button onclick="salvar()">Salvar Lançamento</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Descrição</th>
                <th>Valor</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="lista-corpo"></tbody>
    </table>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAccacBLrvONf4PXDYAhCUoPmZQxi1PJlI",
        authDomain: "despesas-547a2.firebaseapp.com",
        databaseURL: "https://despesas-547a2-default-rtdb.firebaseio.com",
        projectId: "despesas-547a2",
        storageBucket: "despesas-547a2.firebasestorage.app",
        messagingSenderId: "597868249062",
        appId: "1:597868249062:web:915afcfa0c546396cae027"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'transacoes');

    // Função para Salvar Novo Item
    window.salvar = function() {
        const desc = document.getElementById('ipt-desc').value;
        const valor = parseFloat(document.getElementById('ipt-val').value);
        const data = document.getElementById('ipt-data').value;
        const tipo = document.getElementById('ipt-tipo').value;

        if(!desc || isNaN(valor) || !data) {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        push(dbRef, { 
            descricao: desc, 
            valor: valor, 
            data: data, 
            tipo: tipo 
        }).then(function() {
            document.getElementById('ipt-desc').value = "";
            document.getElementById('ipt-val').value = "";
            alert("Salvo com sucesso!");
        }).catch(function(error) {
            alert("Erro ao salvar: " + error.message);
        });
    };

    // Função para Atualizar a Tela em Tempo Real
    onValue(dbRef, function(snapshot) {
        const dados = snapshot.val();
        let somaR = 0;
        let somaD = 0;
        let htmlTabela = "";

        if (dados) {
            // Transformar em array para inverter a ordem (mais novos primeiro)
            const chaves = Object.keys(dados).reverse();
            
            chaves.forEach(function(id) {
                const item = dados[id];
                if (item.tipo === 'receita') {
                    somaR += item.valor;
                } else {
                    somaD += item.valor;
                }

                const corValor = item.tipo === 'receita' ? '#28a745' : '#dc3545';
                
                htmlTabela += "<tr>" +
                    "<td>" + item.data + "</td>" +
                    "<td>" + item.descricao + "</td>" +
                    "<td style='color:" + corValor + "; font-weight:bold;'>R$ " + item.valor.toFixed(2) + "</td>" +
                    "<td><button class='btn-excluir' onclick=\"excluir('" + id + "')\">X</button></td>" +
                "</tr>";
            });
        }

        // Atualizar Tabela e Totais
        document.getElementById('lista-corpo').innerHTML = htmlTabela;
        document.getElementById('tot-r').innerText = "R$ " + somaR.toFixed(2);
        document.getElementById('tot-d').innerText = "R$ " + somaD.toFixed(2);
        document.getElementById('tot-s').innerText = "R$ " + (somaR - somaD).toFixed(2);
        
        // Estilo do Saldo
        const corSaldo = (somaR - somaD) >= 0 ? '#3b82f6' : '#dc3545';
        document.getElementById('tot-s').style.color = corSaldo;
    });

    // Função para Excluir Item
    window.excluir = function(id) {
        if(confirm("Deseja realmente excluir este lançamento?")) {
            remove(ref(db, 'transacoes/' + id));
        }
    };
</script>
</body>
</html>
