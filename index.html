<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Controle Financeiro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header com relógio */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            color: white;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin: 0;
        }

        .relogio {
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 200px;
        }

        .data-atual {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .hora-atual {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
            font-family: monospace;
        }

        /* Lembretes */
        .lembretes-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-left: 4px solid #f59e0b;
        }

        .lembretes-panel h3 {
            color: #f59e0b;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lembrete-item {
            background: #fffbeb;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #f59e0b;
        }

        .lembrete-info {
            flex: 1;
        }

        .lembrete-titulo {
            font-weight: bold;
            color: #333;
        }

        .lembrete-data {
            font-size: 0.85em;
            color: #f59e0b;
            margin-top: 5px;
        }

        .lembrete-dias {
            font-size: 0.8em;
            background: #fef3c7;
            padding: 3px 8px;
            border-radius: 12px;
            color: #d97706;
        }

        /* Modal de edição */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-dashboard {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }

        .card-dashboard:hover {
            transform: translateY(-5px);
        }

        .card-dashboard h3 {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card-dashboard .valor {
            font-size: 2em;
            font-weight: bold;
        }

        .card-dashboard.receitas .valor { color: #10b981; }
        .card-dashboard.despesas .valor { color: #ef4444; }
        .card-dashboard.saldo .valor { color: #3b82f6; }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.3em;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        .mes-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .mes-nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .mes-nav button {
            background: #e5e7eb;
            color: #333;
            padding: 8px 15px;
            font-size: 16px;
        }

        .mes-atual {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            background: #f3f4f6;
            padding: 8px 20px;
            border-radius: 8px;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        input, select, button {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .filtros-avancados {
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .filtros-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filtros-acoes {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .filtros-acoes button {
            background: #e5e7eb;
            color: #333;
            padding: 5px 15px;
            font-size: 12px;
        }

        .filtros-acoes button.limpar {
            background: #ef4444;
            color: white;
        }

        .filtros-principais {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filtros-principais button {
            background: #e5e7eb;
            color: #333;
            padding: 8px 20px;
        }

        .filtros-principais button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .lista-container {
            max-height: 400px;
            overflow-y: auto;
        }

        .lista-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            transition: background 0.3s;
        }

        .lista-item:hover {
            background: #f9fafb;
        }

        .item-info {
            flex: 1;
        }

        .item-descricao {
            font-weight: bold;
            color: #333;
        }

        .item-categoria {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }

        .item-data {
            font-size: 0.8em;
            color: #999;
            margin-left: 10px;
        }

        .item-valor {
            font-weight: bold;
            margin: 0 20px;
        }

        .receber .item-valor { color: #10b981; }
        .pagar .item-valor { color: #ef4444; }

        .acoes-btn {
            display: flex;
            gap: 5px;
        }

        .edit-btn {
            background: #3b82f6;
            padding: 5px 15px;
            font-size: 12px;
        }

        .edit-btn:hover {
            background: #2563eb;
        }

        .delete-btn {
            background: #ef4444;
            padding: 5px 15px;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .total-info {
            text-align: right;
            padding-top: 15px;
            border-top: 2px solid #e5e7eb;
            font-weight: bold;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .resumo-mensal {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .resumo-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }

        .resumo-stat {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 0.8em;
            color: #666;
        }

        .stat-value {
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 5px;
        }

        .stat-value.receita { color: #10b981; }
        .stat-value.despesa { color: #ef4444; }

        @media (max-width: 768px) {
            .form-group {
                grid-template-columns: 1fr;
            }
            
            .lista-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .item-valor {
                margin: 0;
            }

            .header {
                flex-direction: column;
                text-align: center;
            }

            .resumo-stats {
                grid-template-columns: 1fr;
            }

            .acoes-btn {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Sistema de Controle Financeiro</h1>
            <div class="relogio">
                <div class="data-atual" id="dataAtual"></div>
                <div class="hora-atual" id="horaAtual"></div>
            </div>
        </div>

        <!-- Painel de Lembretes -->
        <div class="lembretes-panel" id="lembretesPanel">
            <h3>⏰ Lembretes de Pagamento Próximos</h3>
            <div id="lembretesLista"></div>
        </div>

        <div class="dashboard">
            <div class="card-dashboard receitas">
                <h3>Total de Receitas</h3>
                <div class="valor" id="totalReceitas">R$ 0,00</div>
            </div>
            <div class="card-dashboard despesas">
                <h3>Total de Despesas</h3>
                <div class="valor" id="totalDespesas">R$ 0,00</div>
            </div>
            <div class="card-dashboard saldo">
                <h3>Saldo Total</h3>
                <div class="valor" id="saldoTotal">R$ 0,00</div>
            </div>
        </div>

        <div class="card">
            <h3>➕ Adicionar Lançamento</h3>
            <div class="form-group">
                <input type="text" id="descricao" placeholder="Descrição *" required>
                <input type="number" id="valor" placeholder="Valor *" step="0.01" required>
                <select id="categoria">
                    <option value="">Selecione uma categoria</option>
                    <option value="alimentacao">🍔 Alimentação</option>
                    <option value="transporte">🚗 Transporte</option>
                    <option value="moradia">🏠 Moradia</option>
                    <option value="saude">💊 Saúde</option>
                    <option value="educacao">📚 Educação</option>
                    <option value="lazer">🎮 Lazer</option>
                    <option value="salario">💰 Salário</option>
                    <option value="investimentos">📈 Investimentos</option>
                    <option value="outros">📦 Outros</option>
                </select>
                <select id="tipo">
                    <option value="receber">📈 Receita</option>
                    <option value="pagar">📉 Despesa</option>
                </select>
                <input type="date" id="data" value="">
                <button onclick="adicionar()">Adicionar Lançamento</button>
            </div>
        </div>

        <div class="card">
            <h3>📅 Lançamentos por Mês</h3>
            <div class="mes-selector">
                <div class="mes-nav">
                    <button onclick="navegarMes(-1)">◀ Mês anterior</button>
                    <button onclick="navegarMes(1)">Próximo mês ▶</button>
                </div>
                <div class="mes-atual" id="mesAtual"></div>
            </div>

            <div class="resumo-mensal" id="resumoMensal"></div>

            <div class="filtros-avancados">
                <h4 style="margin-bottom: 10px; color: #333;">🔍 Filtros Avançados</h4>
                <div class="filtros-group">
                    <select id="filtroCategoria">
                        <option value="">Todas as categorias</option>
                        <option value="alimentacao">🍔 Alimentação</option>
                        <option value="transporte">🚗 Transporte</option>
                        <option value="moradia">🏠 Moradia</option>
                        <option value="saude">💊 Saúde</option>
                        <option value="educacao">📚 Educação</option>
                        <option value="lazer">🎮 Lazer</option>
                        <option value="salario">💰 Salário</option>
                        <option value="investimentos">📈 Investimentos</option>
                        <option value="outros">📦 Outros</option>
                    </select>
                    
                    <input type="number" id="filtroValorMin" placeholder="Valor mínimo" step="0.01">
                    <input type="number" id="filtroValorMax" placeholder="Valor máximo" step="0.01">
                    
                    <select id="filtroPeriodo">
                        <option value="todos">Todos os períodos</option>
                        <option value="hoje">Hoje</option>
                        <option value="semana">Última semana</option>
                        <option value="mes">Este mês</option>
                        <option value="trimestre">Último trimestre</option>
                        <option value="ano">Este ano</option>
                    </select>
                </div>
                <div class="filtros-acoes">
                    <button onclick="aplicarFiltrosAvancados()">Aplicar Filtros</button>
                    <button class="limpar" onclick="limparFiltrosAvancados()">Limpar Filtros</button>
                </div>
            </div>

            <div class="filtros-principais">
                <button class="filter-btn active" onclick="filtrar('todos')">Todos</button>
                <button class="filter-btn" onclick="filtrar('receber')">Receitas</button>
                <button class="filter-btn" onclick="filtrar('pagar')">Despesas</button>
            </div>
            <div id="alert" class="alert"></div>
            <div class="lista-container">
                <ul id="lista" style="list-style: none;"></ul>
            </div>
            <div class="total-info" id="totalPeriodo">
                Total do período: R$ 0,00
            </div>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>✏️ Editar Lançamento</h3>
            <input type="text" id="editDescricao" placeholder="Descrição">
            <input type="number" id="editValor" placeholder="Valor" step="0.01">
            <select id="editCategoria">
                <option value="alimentacao">🍔 Alimentação</option>
                <option value="transporte">🚗 Transporte</option>
                <option value="moradia">🏠 Moradia</option>
                <option value="saude">💊 Saúde</option>
                <option value="educacao">📚 Educação</option>
                <option value="lazer">🎮 Lazer</option>
                <option value="salario">💰 Salário</option>
                <option value="investimentos">📈 Investimentos</option>
                <option value="outros">📦 Outros</option>
            </select>
            <select id="editTipo">
                <option value="receber">📈 Receita</option>
                <option value="pagar">📉 Despesa</option>
            </select>
            <input type="date" id="editData">
            <div class="modal-buttons">
                <button onclick="fecharModal()">Cancelar</button>
                <button onclick="salvarEdicao()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        let dados = JSON.parse(localStorage.getItem('dados')) || [];
        let filtroAtual = 'todos';
        let mesSelecionado = new Date();
        let editandoIndex = null;
        let filtrosAvancadosAtivos = {
            categoria: '',
            valorMin: null,
            valorMax: null,
            periodo: 'todos'
        };
        
        function atualizarRelogio() {
            const agora = new Date();
            const dataFormatada = agora.toLocaleDateString('pt-BR', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            const horaFormatada = agora.toLocaleTimeString('pt-BR');
            
            document.getElementById('dataAtual').innerHTML = dataFormatada;
            document.getElementById('horaAtual').innerHTML = horaFormatada;
        }
        
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
        
        function salvar() {
            localStorage.setItem('dados', JSON.stringify(dados));
        }
        
        function mostrarAlerta(mensagem, tipo) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${tipo} show`;
            alert.innerHTML = mensagem;
            setTimeout(() => {
                alert.classList.remove('show');
            }, 3000);
        }
        
        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            });
        }
        
        function getCategoriaIcon(categoria) {
            const icons = {
                'alimentacao': '🍔',
                'transporte': '🚗',
                'moradia': '🏠',
                'saude': '💊',
                'educacao': '📚',
                'lazer': '🎮',
                'salario': '💰',
                'investimentos': '📈',
                'outros': '📦'
            };
            return icons[categoria] || '📦';
        }
        
        function getCategoriaNome(categoria) {
            const nomes = {
                'alimentacao': 'Alimentação',
                'transporte': 'Transporte',
                'moradia': 'Moradia',
                'saude': 'Saúde',
                'educacao': 'Educação',
                'lazer': 'Lazer',
                'salario': 'Salário',
                'investimentos': 'Investimentos',
                'outros': 'Outros'
            };
            return nomes[categoria] || categoria;
        }
        
        function verificarLembretes() {
            const hoje = new Date();
            const lembreteDias = 5; // Alertar com 5 dias de antecedência
            const lembretes = [];
            
            dados.forEach(item => {
                if (item.tipo === 'pagar') {
                    const dataVencimento = new Date(item.data);
                    const diffDias = Math.ceil((dataVencimento - hoje) / (1000 * 60 * 60 * 24));
                    
                    if (diffDias >= 0 && diffDias <= lembreteDias) {
                        lembretes.push({
                            ...item,
                            diasRestantes: diffDias
                        });
                    }
                }
            });
            
            const lembretesLista = document.getElementById('lembretesLista');
            
            if (lembretes.length === 0) {
                lembretesLista.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Nenhum lembrete pendente</div>';
                return;
            }
            
            lembretesLista.innerHTML = lembretes.map(lembrete => `
                <div class="lembrete-item">
                    <div class="lembrete-info">
                        <div class="lembrete-titulo">${lembrete.descricao}</div>
                        <div class="lembrete-data">Vence em: ${new Date(lembrete.data).toLocaleDateString('pt-BR')}</div>
                    </div>
                    <div class="lembrete-dias">
                        ${lembrete.diasRestantes === 0 ? 'Vence hoje!' : `${lembrete.diasRestantes} dias restantes`}
                    </div>
                </div>
            `).join('');
        }
        
        function filtrarPorPeriodo(item) {
            const hoje = new Date();
            const dataItem = new Date(item.data);
            
            switch(filtrosAvancadosAtivos.periodo) {
                case 'hoje':
                    return dataItem.toDateString() === hoje.toDateString();
                case 'semana':
                    const semanaAtras = new Date();
                    semanaAtras.setDate(hoje.getDate() - 7);
                    return dataItem >= semanaAtras;
                case 'mes':
                    return dataItem.getMonth() === hoje.getMonth() && 
                           dataItem.getFullYear() === hoje.getFullYear();
                case 'trimestre':
                    const trimestreAtras = new Date();
                    trimestreAtras.setMonth(hoje.getMonth() - 3);
                    return dataItem >= trimestreAtras;
                case 'ano':
                    return dataItem.getFullYear() === hoje.getFullYear();
                default:
                    return true;
            }
        }
        
        function aplicarFiltrosAvancados() {
            filtrosAvancadosAtivos.categoria = document.getElementById('filtroCategoria').value;
            filtrosAvancadosAtivos.valorMin = document.getElementById('filtroValorMin').value ? 
                parseFloat(document.getElementById('filtroValorMin').value) : null;
            filtrosAvancadosAtivos.valorMax = document.getElementById('filtroValorMax').value ? 
                parseFloat(document.getElementById('filtroValorMax').value) : null;
            filtrosAvancadosAtivos.periodo = document.getElementById('filtroPeriodo').value;
            
            atualizar();
            mostrarAlerta('Filtros aplicados com sucesso!', 'success');
        }
        
        function limparFiltrosAvancados() {
            document.getElementById('filtroCategoria').value = '';
            document.getElementById('filtroValorMin').value = '';
            document.getElementById('filtroValorMax').value = '';
            document.getElementById('filtroPeriodo').value = 'todos';
            
            filtrosAvancadosAtivos = {
                categoria: '',
                valorMin: null,
                valorMax: null,
                periodo: 'todos'
            };
            
            atualizar();
            mostrarAlerta('Filtros removidos!', 'success');
        }
        
        function filtrarPorMes() {
            const ano = mesSelecionado.getFullYear();
            const mes = mesSelecionado.getMonth();
            
            return dados.filter(item => {
                const itemData = new Date(item.data);
                return itemData.getFullYear() === ano && itemData.getMonth() === mes;
            });
        }
        
        function aplicarFiltrosItens(items) {
            return items.filter(item => {
                if (filtrosAvancadosAtivos.categoria && item.categoria !== filtrosAvancadosAtivos.categoria) {
                    return false;
                }
                
                if (filtrosAvancadosAtivos.valorMin !== null && item.valor < filtrosAvancadosAtivos.valorMin) {
                    return false;
                }
                
                if (filtrosAvancadosAtivos.valorMax !== null && item.valor > filtrosAvancadosAtivos.valorMax) {
                    return false;
                }
                
                if (!filtrarPorPeriodo(item)) {
                    return false;
                }
                
                return true;
            });
        }
        
        function atualizarResumoMensal() {
            const dadosMes = filtrarPorMes();
            const dadosFiltrados = aplicarFiltrosItens(dadosMes);
            let totalReceitasMes = 0;
            let totalDespesasMes = 0;
            
            dadosFiltrados.forEach(item => {
                if (item.tipo === 'receber') {
                    totalReceitasMes += item.valor;
                } else {
                    totalDespesasMes += item.valor;
                }
            });
            
            const saldoMes = totalReceitasMes - totalDespesasMes;
            const nomeMes = mesSelecionado.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
            
            const resumoHTML = `
                <h4>📊 Resumo de ${nomeMes}</h4>
                <div class="resumo-stats">
                    <div class="resumo-stat">
                        <div class="stat-label">Receitas do mês</div>
                        <div class="stat-value receita">${formatarMoeda(totalReceitasMes)}</div>
                    </div>
                    <div class="resumo-stat">
                        <div class="stat-label">Despesas do mês</div>
                        <div class="stat-value despesa">${formatarMoeda(totalDespesasMes)}</div>
                    </div>
                    <div class="resumo-stat">
                        <div class="stat-label">Saldo do mês</div>
                        <div class="stat-value" style="color: ${saldoMes >= 0 ? '#10b981' : '#ef4444'}">${formatarMoeda(saldoMes)}</div>
                    </div>
                </div>
            `;
            
            document.getElementById('resumoMensal').innerHTML = resumoHTML;
            document.getElementById('mesAtual').innerHTML = nomeMes.charAt(0).toUpperCase() + nomeMes.slice(1);
        }
        
        function abrirModalEditar(index) {
            editandoIndex = index;
            const item = dados[index];
            
            document.getElementById('editDescricao').value = item.descricao;
            document.getElementById('editValor').value = item.valor;
            document.getElementById('editCategoria').value = item.categoria;
            document.getElementById('editTipo').value = item.tipo;
            document.getElementById('editData').value = item.data;
            
            document.getElementById('editModal').classList.add('active');
        }
        
        function fecharModal() {
            document.getElementById('editModal').classList.remove('active');
            editandoIndex = null;
        }
        
        function salvarEdicao() {
            if (editandoIndex !== null) {
                const descricao = document.getElementById('editDescricao').value.trim();
                const valor = parseFloat(document.getElementById('editValor').value);
                const categoria = document.getElementById('editCategoria').value;
                const tipo = document.getElementById('editTipo').value;
                const data = document.getElementById('editData').value;
                
                if (!descricao || isNaN(valor) || valor <= 0 || !categoria || !data) {
                    mostrarAlerta('Preencha todos os campos corretamente!', 'error');
                    return;
                }
                
                dados[editandoIndex] = {
                    ...dados[editandoIndex],
                    descricao,
                    valor,
                    categoria,
                    tipo,
                    data
                };
                
                salvar();
                atualizar();
                fecharModal();
                mostrarAlerta('Lançamento atualizado com sucesso!', 'success');
            }
        }
        
        function atualizar() {
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            
            let totalReceitas = 0;
            let totalDespesas = 0;
            let totalPeriodo = 0;
            
            const dadosMes = filtrarPorMes();
            const dadosFiltradosTipo = filtroAtual === 'todos' ? dadosMes : dadosMes.filter(item => item.tipo === filtroAtual);
            const dadosFiltrados = aplicarFiltrosItens(dadosFiltradosTipo);
            
            if (dadosFiltrados.length === 0) {
                const li = document.createElement('li');
                li.style.textAlign = 'center';
                li.style.padding = '20px';
                li.style.color = '#999';
                li.innerHTML = 'Nenhum lançamento encontrado com os filtros selecionados';
                lista.appendChild(li);
            } else {
                dadosFiltrados.forEach((item) => {
                    const li = document.createElement('li');
                    li.className = `lista-item ${item.tipo}`;
                    
                    const dataOriginal = item.data;
                    const dataFormatada = new Date(dataOriginal).toLocaleDateString('pt-BR');
                    
                    li.innerHTML = `
                        <div class="item-info">
                            <div class="item-descricao">
                                ${item.descricao}
                                <span class="item-data">${dataFormatada}</span>
                            </div>
                            <div class="item-categoria">
                                ${getCategoriaIcon(item.categoria)} ${getCategoriaNome(item.categoria)}
                            </div>
                        </div>
                        <div class="item-valor">
                            ${item.tipo === 'receber' ? '+' : '-'} ${formatarMoeda(item.valor)}
                        </div>
                        <div class="acoes-btn">
                            <button class="edit-btn" onclick="abrirModalEditar(${dados.indexOf(item)})">✏️</button>
                            <button class="delete-btn" onclick="remover(${dados.indexOf(item)})">🗑️</button>
                        </div>
                    `;
                    
                    lista.appendChild(li);
                    
                    if (item.tipo === 'receber') {
                        totalReceitas += item.valor;
                    } else {
                        totalDespesas += item.valor;
                    }
                    
                    totalPeriodo += item.tipo === 'receber' ? item.valor : -item.valor;
                });
            }
            
            let totalReceitasGeral = 0;
            let totalDespesasGeral = 0;
            
            const dadosComFiltrosGerais = aplicarFiltrosItens(dados);
            dadosComFiltrosGerais.forEach(item => {
                if (item.tipo === 'receber') {
                    totalReceitasGeral += item.valor;
                } else {
                    totalDespesasGeral += item.valor;
                }
            });
            
            const saldoGeral = totalReceitasGeral - totalDespesasGeral;
            
            document.getElementById('totalReceitas').innerHTML = formatarMoeda(totalReceitasGeral);
            document.getElementById('totalDespesas').innerHTML = formatarMoeda(totalDespesasGeral);
            document.getElementById('saldoTotal').innerHTML = formatarMoeda(saldoGeral);
            
            const saldoElement = document.getElementById('saldoTotal');
            if (saldoGeral >= 0) {
                saldoElement.style.color = '#10b981';
            } else {
                saldoElement.style.color = '#ef4444';
            }
            
            document.getElementById('totalPeriodo').innerHTML = `Total ${filtroAtual === 'receber' ? 'das Receitas' : filtroAtual === 'pagar' ? 'das Despesas' : 'do período'}: ${formatarMoeda(Math.abs(totalPeriodo))}`;
            
            atualizarResumoMensal();
            verificarLembretes();
        }
        
        function adicionar() {
            const descricao = document.getElementById('descricao').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);
            const tipo = document.getElementById('tipo').value;
            const categoria = document.getElementById('categoria').value;
            let data = document.getElementById('data').value;
            
            if (!descricao) {
                mostrarAlerta('Por favor, preencha a descrição!', 'error');
                return;
            }
            
            if (isNaN(valor) || valor <= 0) {
                mostrarAlerta('Por favor, insira um valor válido maior que zero!', 'error');
                return;
            }
            
            if (!categoria) {
                mostrarAlerta('Por favor, selecione uma categoria!', 'error');
                return;
            }
            
            if (!data) {
                data = new Date().toISOString().split('T')[0];
            }
            
            dados.push({ 
                descricao, 
                valor, 
                tipo, 
                categoria,
                data,
                dataCriacao: new Date().toISOString()
            });
            
            salvar();
            atualizar();
            
            document.getElementById('descricao').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('categoria').value = '';
            document.getElementById('data').value = '';
            
            mostrarAlerta('Lançamento adicionado com sucesso!', 'success');
        }
        
        function remover(index) {
            if (confirm('Tem certeza que deseja excluir este lançamento?')) {
                dados.splice(index, 1);
                salvar();
                atualizar();
                mostrarAlerta('Lançamento removido com sucesso!', 'success');
            }
        }
        
        function filtrar(tipo) {
            filtroAtual = tipo;
            atualizar();
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        function navegarMes(direcao) {
            mesSelecionado.setMonth(mesSelecionado.getMonth() + direcao);
            atualizar();
        }
        
        atualizar();
    </script>
</body>
</html>
