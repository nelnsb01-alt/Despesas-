<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastoFácil - Firebase</title>
    <style>
        :root { --primary: #667eea; --secondary: #764ba2; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary)); min-height: 100vh; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .valor { font-size: 1.8rem; font-weight: bold; margin-top: 10px; }
        #val-receitas { color: #10b981; }
        #val-despesas { color: #ef4444; }
        #val-saldo { color: #3b82f6; }
        .form-group input, .form-group select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; background: #333; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-excluir { background: #ff4d4d; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>GastoFácil</h1>
        <p>Controle Financeiro</p>
    </div>

    <div class="card">
        <h3>Receitas</h3>
        <div id="val-receitas" class="valor">R$ 0,00</div>
    </div>
    <div class="card">
        <h3>Despesas</h3>
        <div id="val-despesas" class="valor">R$ 0,00</div>
    </div>
    <div class="card">
        <h3>Saldo Atual</h3>
        <div id="val-saldo" class="valor">R$ 0,00</div>
    </div>

    <div class="card">
        <h3>Novo Lançamento</h3>
        <div class="form-group">
            <input type="text" id="desc" placeholder="Descrição">
            <input type="number" id="valor" placeholder="Valor R$">
            <input type="date" id="data">
            <select id="tipo">
                <option value="receita">Receita</option>
                <option value="despesa">Despesa</option>
            </select>
            <button onclick="salvar()">Salvar</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Desc.</th>
                <th>Valor</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAccacBLrvONf4PXDYAhCUoPmZQxi1PJlI",
        authDomain: "despesas-547a2.firebaseapp.com",
        databaseURL: "https://despesas-547a2-default-rtdb.firebaseio.com",
        projectId: "despesas-547a2",
        storageBucket: "despesas-547a2.firebasestorage.app",
        messagingSenderId: "597868249062",
        appId: "1:597868249062:web:915afcfa0c546396cae027"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'transacoes');

    window.salvar = () => {
        const d = document.getElementById('desc').value;
        const v = parseFloat(document.getElementById('valor').value);
        const dt = document.getElementById('data').value;
        const t = document.getElementById('tipo').value;

        if(!d || !v || !dt) return alert("Preencha tudo!");

        push(dbRef, { d, v, dt, t }).then(() => {
            document.getElementById('desc').value = "";
            document.getElementById('valor').value = "";
        });
    };

    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        let totalR = 0, totalD = 0, html = "";
        
        if(data) {
            Object.keys(data).forEach(id => {
                const item = data[id];
                if(item.t === 'receita') totalR += item.v; else totalD += item.v;
                
                html += "<tr>" +
                    "<td>" + item.dt + "</td>" +
                    "<td>" + item.d + "</td>" +
                    "<td style='color:" + (item.t === 'receita' ? 'green' : 'red') + "'>R$ " + item.v.toFixed(2) + "</td>" +
                    "<td><button class='btn-excluir' onclick=\"excluir('" + id + "')\">X</button></td>" +
                "</tr>";
            });
        }

        document.getElementById('tabela').innerHTML = html;
        document.getElementById('val-receitas').innerText = "R$ " + totalR.toFixed(2);
        document.getElementById('val-despesas').innerText = "R$ " + totalD.toFixed(2);
        document.getElementById('val-saldo').innerText = "R$ " + (totalR - totalD).toFixed(2);
    });

    window.excluir = (id) => { if(confirm("Excluir?")) remove(ref(db, 'transacoes/' + id)); };
</script>

</body>
</html>
