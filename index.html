<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastoFácil - Controle Financeiro</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .saldo-container { text-align: center; margin-bottom: 20px; }
        .saldo-valor { font-size: 24px; font-weight: bold; }
        .receita { color: green; }
        .despesa { color: red; }
        input, select, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #28a745; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background-color: #218838; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        .btn-excluir { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>GastoFácil</h2>

    <div class="saldo-container">
        <div>Saldo Atual</div>
        <div id="saldoTotal" class="saldo-valor">R$ 0,00</div>
    </div>

    <input type="text" id="descricao" placeholder="Descrição (ex: Aluguel)">
    <input type="number" id="valor" placeholder="Valor (R$)">
    <input type="date" id="data">
    <select id="tipo">
        <option value="receita">Receita</option>
        <option value="despesa">Despesa</option>
    </select>
    <button onclick="adicionarTransicao()">Adicionar</button>

    <h3>Histórico</h3>
    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Desc.</th>
                <th>Valor</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="listaTransacoes"></tbody>
    </table>
</div>

<script>
    let transacoes = JSON.parse(localStorage.getItem('transacoes')) || [];

    function atualizarInterface() {
        const lista = document.getElementById('listaTransacoes');
        const saldoElemento = document.getElementById('saldoTotal');
        lista.innerHTML = '';
        
        let total = 0;

        transacoes.forEach((t, index) => {
            const valorNumerico = parseFloat(t.valor);
            if (t.tipo === 'receita') {
                total += valorNumerico;
            } else {
                total -= valorNumerico;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${t.data}</td>
                <td>${t.descricao}</td>
                <td class="\({t.tipo === 'receita' ? 'receita' : 'despesa'}">R\) ${valorNumerico.toFixed(2)}</td>
                <td><button class="btn-excluir" onclick="removerTransicao(${index})">X</button></td>
            `;
            lista.appendChild(row);
        });

        saldoElemento.innerText = `R\( \){total.toFixed(2)}`;
        saldoElemento.className = `saldo-valor ${total >= 0 ? 'receita' : 'despesa'}`;
        
        localStorage.setItem('transacoes', JSON.stringify(transacoes));
    }

    function adicionarTransicao() {
        const descricao = document.getElementById('descricao').value;
        const valor = document.getElementById('valor').value;
        const data = document.getElementById('data').value;
        const tipo = document.getElementById('tipo').value;

        if (descricao === '' || valor === '' || data === '') {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        const novaTransicao = { descricao, valor, data, tipo };
        transacoes.push(novaTransicao);
        atualizarInterface();

        document.getElementById('descricao').value = '';
        document.getElementById('valor').value = '';
        document.getElementById('data').value = '';
    }

    function removerTransicao(index) {
        if (confirm("Deseja excluir esta transação?")) {
            transacoes.splice(index, 1);
            atualizarInterface();
        }
    }

    // Carregar dados ao abrir a página
    atualizarInterface();
</script>

</body>
</html>
